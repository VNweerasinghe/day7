<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number Guess Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="card shadow-sm mx-auto" style="max-width: 500px;">
        <div class="card-body">
            <h1 class="card-title text-center mb-3">Random Number Guess Game</h1>
            <p class="text-center">Guess a number between <strong>1 and 100</strong></p>

            <div class="mb-3">
                <input type="number" class="form-control" id="guessInput" placeholder="Enter your guess">
            </div>

            <div class="d-flex gap-2 mb-3">
                <button class="btn btn-primary" id="submitBtn">Submit Guess</button>
                <button class="btn btn-outline-secondary" id="retryBtn">Retry</button>
            </div>

            <p id="result" class="fw-bold"></p>
            <p><strong>Previous Guesses:</strong> <span id="previous"></span></p>
            <p><strong>Number of Guesses:</strong> <span id="count">0</span></p>
        </div>
    </div>
</div>

<script src="app.js"></script>

</body>
</html>
