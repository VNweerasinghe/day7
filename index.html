<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number Guess Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Random Number Guess Game</h1>
    <p>Guess a number between <b>1 and 100</b></p>

    <input type="number" id="guessInput" placeholder="Enter your guess">

    <br><br>

    <button id="submitBtn">Submit Guess</button>
    <button id="retryBtn">Retry</button>

    <p id="result"></p>
    <p><b>Previous Guesses:</b> <span id="previous"></span></p>
    <p><b>Number of Guesses:</b> <span id="count">0</span></p>
</div>

<script src="app.js"></script>

</body>
</html>
